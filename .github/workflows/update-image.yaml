name: Update image

on:
  workflow_call:
    inputs:
      image: { type: string, required: true }
    secrets:
      token: { required: true }

jobs:
  update:
    name: Update

    permissions:
      contents: write
      pull-requests: write

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with: { fetch-depth: 0 }

      - name: Install requirements
        run: |
          sudo apt-get update
          sudo apt-get -y install moreutils uuid

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update image
        id: update
        env:
          GH_TOKEN: ${{ secrets.token }}
          IMAGE: ${{ inputs.image }}
        run: |
          set -euo pipefail

          git checkout -b "image/$IMAGE/$(uuid -v4 | cut -d- -f2)"

          bash ./images/bin/update.sh "$IMAGE"
          npx -y prettier -w "images/src/$IMAGE"

          if git diff --quiet && git diff --cached --quiet; then
            echo "skip=1" >>$GITHUB_OUTPUT
            exit 0
          fi

          git commit -am "image/$IMAGE: update dependencies"
          git push -u origin HEAD
          echo "skip=0" >>$GITHUB_OUTPUT

      - name: Create pull request
        if: steps.update.outputs.skip == '0'
        env:
          GH_TOKEN: ${{ secrets.token }}
          IMAGE: ${{ inputs.image }}
        run: |
          set -euo pipefail

          LOCK="images/src/$IMAGE/.devcontainer/devcontainer-lock.json"
          TITLE_MAX=120

          FEAT_KEY=$(
            jq -r \
              '(.features // {})
              | to_entries
              | map({
                  name: (.key | split("/") | last),
                  version: .value.version
                })
              | sort_by(.name)
              | map("\(.name)=\(.version)")
              | join("|")' \
              "$LOCK"
          )
          FEAT_FULL=$(
            jq -r \
              '(.features // {})
              | to_entries
              | map({
                  name: (.key | split("/") | last),
                  version: .value.version
                })
              | sort_by(.name)
              | map("\(.name) \(.version)")
              | if length == 0 then "none" else join(", ") end' \
              "$LOCK"
          )

          PR_TITLE="img($IMAGE): update feat ($FEAT_FULL)"
          if (( ${#PR_TITLE} > TITLE_MAX )); then
            PR_TITLE="${PR_TITLE:0:$((TITLE_MAX - 3))}..."
          fi
          BODY_MARKER="<!-- updater-dedupe:kind=img;name=$IMAGE;deps=$FEAT_KEY -->"

          EXISTING_PR=$(
            gh pr list --state open --base main --limit 200 --json number,body |
              jq -r --arg MARKER "$BODY_MARKER" \
                '.[] | select((.body // "") | contains($MARKER)) | .number' |
              head -n1
          )

          if [[ -n "$EXISTING_PR" ]]; then
            echo "Skipping PR creation: duplicate open PR #$EXISTING_PR for $IMAGE with same feature versions"
            exit 0
          fi

          BODY_FILE=$(mktemp)
          {
            echo "Automated image feature refresh."
            echo
            echo "$BODY_MARKER"
            echo
            echo "Feature versions: $FEAT_FULL"
          } >"$BODY_FILE"

          gh pr create \
            --title "$PR_TITLE" \
            --body-file "$BODY_FILE" \
            --base main
