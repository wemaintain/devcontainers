name: Update feature

on:
  workflow_call:
    inputs:
      feature: { type: string, required: true }
    secrets:
      token: { required: true }

jobs:
  update:
    name: Update

    permissions:
      contents: write
      pull-requests: write

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with: { fetch-depth: 0 }

      - name: Install requirements
        run: |
          sudo apt-get update
          sudo apt-get -y install moreutils parallel uuid

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update feature
        id: update
        env:
          GH_TOKEN: ${{ github.token }}
          FEATURE: ${{ inputs.feature }}
        run: |
          set -euo pipefail

          git checkout -b "feature/$FEATURE/$(uuid -v4 | cut -d- -f2)"

          bash ./features/bin/update.sh "$FEATURE"
          npx -y prettier -w "features/src/$FEATURE"

          if git diff --quiet && git diff --cached --quiet; then
            echo "skip=1" >>$GITHUB_OUTPUT
            exit 0
          fi

          git commit -am "feature/$FEATURE: update dependencies"
          git push -u origin HEAD
          echo "skip=0" >>$GITHUB_OUTPUT

      - name: Create pull request
        if: steps.update.outputs.skip == '0'
        env:
          GH_TOKEN: ${{ secrets.token }}
          FEATURE: ${{ inputs.feature }}
        run: |
          set -euo pipefail

          CONFIG="features/src/$FEATURE/devcontainer-feature.json"
          TITLE_MAX=120

          DEPS_KEY=$(
            jq -r \
              '(.customizations.manifest.dependencies // [])
              | map("\(.name)=\(.version)")
              | sort
              | join("|")' \
              "$CONFIG"
          )
          DEPS_FULL=$(
            jq -r \
              '(.customizations.manifest.dependencies // [])
              | map("\(.name) \(.version)")
              | sort
              | if length == 0 then "none" else join(", ") end' \
              "$CONFIG"
          )

          PR_TITLE="feat($FEATURE): update deps ($DEPS_FULL)"
          if (( ${#PR_TITLE} > TITLE_MAX )); then
            PR_TITLE="${PR_TITLE:0:$((TITLE_MAX - 3))}..."
          fi
          BODY_MARKER="<!-- updater-dedupe:kind=feat;name=$FEATURE;deps=$DEPS_KEY -->"

          EXISTING_PR=$(
            gh pr list --state open --base main --limit 200 --json number,body |
              jq -r --arg MARKER "$BODY_MARKER" \
                '.[] | select((.body // "") | contains($MARKER)) | .number' |
              head -n1
          )

          if [[ -n "$EXISTING_PR" ]]; then
            echo "Skipping PR creation: duplicate open PR #$EXISTING_PR for $FEATURE with same dependency versions"
            exit 0
          fi

          BODY_FILE=$(mktemp)
          {
            echo "Automated feature dependency update."
            echo
            echo "$BODY_MARKER"
            echo
            echo "Dependencies: $DEPS_FULL"
          } >"$BODY_FILE"

          gh pr create \
            --title "$PR_TITLE" \
            --body-file "$BODY_FILE" \
            --base main
